kind = "web"
previewPath = "/"
title = "Pharma Arena"
version = "1.0.0"
id = "artifacts/pharma-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21497

[services.development]
run = "pnpm --filter @workspace/pharma-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pharma-arena", "run", "build" ]
publicDir = "artifacts/pharma-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21497"
BASE_PATH = "/"
